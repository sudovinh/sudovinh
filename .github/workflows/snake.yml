name: Generate Snake Animation

on:
  schedule:
    # Twice a day
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Deliberately not triggered on push: the metrics/waka bots commit to main
# hourly, which would regenerate the snake far more often than needed.

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      # Needed to push the generated SVGs to the `output` branch.
      contents: write
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v5.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
