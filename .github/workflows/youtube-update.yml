name: Latest YouTube Videos Updates
on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # 1.9.6
        # The channel currently has no public videos, so YouTube's feed returns
        # 404 and fails the step. Tolerate that so the scheduled run stays green;
        # it will populate the README automatically once videos are published.
        continue-on-error: true
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCqqqRI3fx6G9WGgkA1nQkVg"
          # YouTube's feed endpoint can also 404 transiently under load; retry
          # before giving up so real content isn't missed once videos exist.
          retry_count: 5
          retry_wait_time: 30
