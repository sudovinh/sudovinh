name: Latest YouTube Videos Updates
on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCqqqRI3fx6G9WGgkA1nQkVg"
          # YouTube's feed endpoint intermittently returns 404 (rate limiting).
          # Retry transient failures instead of failing the whole run.
          retry_count: 5
          retry_wait_time: 30
